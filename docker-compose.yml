# =========================================
# 智能竞品分析 Agent - Docker Compose
# 使用方式：docker-compose up -d
# =========================================

services:
  # -------- PostgreSQL 数据库 --------
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app123
      - POSTGRES_DB=competitor_analysis
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d competitor_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------- 后端 API --------
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgresql+asyncpg://app:app123@postgres:5432/competitor_analysis
      - CHROMA_PERSIST_DIR=/data/chroma
      - REPORT_OUTPUT_DIR=/data/reports
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------- 前端（Nginx 托管 + 反向代理 API）--------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # -------- Redis（缓存 + 未来任务队列）--------
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
